<title>Maradhoo United — Coming Soon</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --red:#D41920;
  --black:#111;
  --dark:#0a0a0a;
  --white:#f0f0f0;
  --grey:#888;
}

html,body{height:100%;overflow:hidden;font-family:'Barlow',sans-serif;background:var(--dark);color:var(--white)}

.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg::before{
  content:'';position:absolute;inset:-50%;
  background:
    radial-gradient(ellipse 600px 600px at 20% 50%, rgba(212,25,32,.08) 0%, transparent 70%),
    radial-gradient(ellipse 400px 400px at 80% 30%, rgba(212,25,32,.05) 0%, transparent 70%);
  animation:bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.1) translate(-2%,3%)}}

.bg::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    -45deg,
    transparent,transparent 40px,
    rgba(255,255,255,.01) 40px,rgba(255,255,255,.01) 41px
  );
}

.grain{
  position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

.container{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;padding:2rem;text-align:center;
}

.logo-wrap{
  width:160px;height:160px;margin-bottom:2rem;
  animation:logoIn 1.2s cubic-bezier(.16,1,.3,1) both;
}
.logo-wrap img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 40px rgba(212,25,32,.25))}

@keyframes logoIn{
  0%{opacity:0;transform:scale(.7) translateY(20px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}

.club-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.8rem,8vw,5.5rem);
  letter-spacing:.12em;
  line-height:.95;
  animation:textIn .9s .3s cubic-bezier(.16,1,.3,1) both;
}
.club-name .united{
  display:block;
  color:var(--red);
  font-size:.55em;
  letter-spacing:.25em;
}

@keyframes textIn{
  0%{opacity:0;transform:translateY(30px);filter:blur(8px)}
  100%{opacity:1;transform:translateY(0);filter:blur(0)}
}

.divider{
  width:60px;height:2px;background:var(--red);margin:1.5rem 0;
  animation:divIn .6s .6s ease both;
}
@keyframes divIn{0%{opacity:0;width:0}100%{opacity:1;width:60px}}

.coming-soon{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1rem,3vw,1.4rem);
  letter-spacing:.35em;
  color:var(--grey);
  animation:fadeUp .8s .8s ease both;
}

@keyframes fadeUp{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}

.tagline{
  margin-top:1rem;
  font-weight:300;font-size:.95rem;
  color:rgba(255,255,255,.4);
  letter-spacing:.05em;
  animation:fadeUp .8s 1s ease both;
}

.location{
  margin-top:2.5rem;
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.5rem 1.2rem;
  border:1px solid rgba(255,255,255,.08);
  border-radius:100px;
  font-size:.8rem;letter-spacing:.08em;color:var(--grey);
  animation:fadeUp .8s 1.2s ease both;
}
.location svg{width:14px;height:14px;stroke:var(--red);fill:none;stroke-width:2}

.bottom{
  position:fixed;bottom:0;left:0;right:0;z-index:3;
  display:flex;justify-content:center;
  padding:1.5rem;
  animation:fadeUp .8s 1.5s ease both;
}
.bottom span{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.2)}

.topline{
  position:fixed;top:0;left:0;right:0;height:3px;z-index:10;
  background:linear-gradient(90deg,transparent,var(--red),transparent);
  animation:lineIn 1.5s .2s ease both;
}
@keyframes lineIn{0%{opacity:0;transform:scaleX(0)}100%{opacity:1;transform:scaleX(1)}}

.pulse-dot{
  display:inline-block;width:6px;height:6px;background:var(--red);
  border-radius:50%;margin-right:.6rem;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
</style>
</head>
